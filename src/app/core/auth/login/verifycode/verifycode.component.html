<div class="auth-page" dir="rtl">
    <div class="auth-card">
        <div class="auth-head">
            <h2>تأكيد الكود</h2>
            <p>أدخل كود التحقق الذي تم إرساله إلى بريدك الإلكتروني.</p>
        </div>

        <form (submit)="onVerify($event)">
            <label>كود التحقق
                <input type="text" [(ngModel)]="code" name="code" maxlength="10" required />
            </label>

            <div class="actions">
                <button class="primary" type="submit">تحقق</button>
                <a class="link" routerLink="/auth/login">العودة لتسجيل الدخول</a>
            </div>
        </form>

        <div class="message" *ngIf="message">{{ message }}</div>
    </div>
</div>
